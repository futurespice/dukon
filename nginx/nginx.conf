# AUDIT-3 NEW FIX: Added proper top-level structure.
# This file is mounted as /etc/nginx/nginx.conf (main config), so it needs
# worker_processes, events{}, and http{} blocks.

worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # DEVOPS FIX #14: rate limiting zones defined at http level.
    # limit_req_zone tracks requests by client IP using a 10 MB shared memory zone.
    # - api:    60 req/min for general API calls (bursts of up to 20 queued)
    # - auth:   10 req/min for login/register endpoints (brute-force protection)
    # - strict:  5 req/min for WhatsApp code dispatch (prevents flooding)
    #
    # These are server-side guards in addition to DRF throttling.
    # DRF throttling runs inside Python/Django and is bypassable if the process
    # crashes or restarts; nginx rate limits apply before any app code runs.

    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
    limit_req_zone $binary_remote_addr zone=strict:10m rate=5r/m;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    upstream django {
        server web:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name beurer.kg;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name beurer.kg;

        # SSL certificates (provided via certbot / Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/beurer.kg/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/beurer.kg/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP stapling reduces TLS handshake latency.
        ssl_stapling on;
        ssl_stapling_verify on;
        # Primary: Docker internal DNS (127.0.0.11).
        # Fallback: Cloudflare (1.1.1.1) — used when Docker DNS cannot resolve
        # external OCSP hostnames in restrictive cloud network environments.
        resolver 127.0.0.11 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        # CSP: API-only backend. Restricts script/object sources.
        # Swagger UI needs unsafe-inline for styles; adjust if you host a frontend here.
        add_header Content-Security-Policy   "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

        client_max_body_size 20M;

        # Static files — long cache, immutable (content-addressed by collectstatic)
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # DEVOPS FIX #20: media files — use ETag for conditional requests.
        location /media/ {
            alias /var/www/media/;
            add_header Cache-Control "no-cache";
            etag on;
            if_modified_since exact;
        }

        # Rate limiting on sensitive auth endpoints.
        location ~ ^/api/v1/accounts/(login|register|resend-verify-code|check/verify-code|reset-password|phone-number-change|2fa) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://django;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # WhatsApp code dispatch — strictest limit (5/min)
        location ~ ^/api/v1/accounts/reset-password/send-code {
            limit_req zone=strict burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://django;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health check — no rate limiting, no access log
        location /health/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            access_log off;
        }

        # General Django app — moderate rate limiting
        location / {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://django;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
