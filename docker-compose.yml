# DEVOPS FIX #10: removed invalid "version: 3.11" — Compose spec versions end at 3.8.
# Modern Docker Compose ignores this field, but it's misleading and technically wrong.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dukon_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 5432 занят локальным PostgreSQL; внешний порт 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AUDIT-3 DEVOPS FIX #10: Enable persistence so 2FA tokens and
    # verification codes survive Redis restarts in local dev.
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # DEVOPS FIX #15: cap log size in dev too — long sessions accumulate quickly.
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  celery:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    command: celery -A config worker -l info -Q default,urgent --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  celery-beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    command: celery -A config beat -l info
    # DEVOPS FIX #16: depend on db and redis directly, not just the worker.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
