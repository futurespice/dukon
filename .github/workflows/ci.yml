name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest pytest-django pytest-cov

      - name: Lint with flake8
        run: |
          flake8 apps config \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,.venv \
            --ignore=W503

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        # Threshold raised from 10 to 40.
        # Target: 70%+ — prioritise tests for auth flows, order creation, phone change.
        run: |
          pytest \
            --tb=short \
            --cov=apps \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -q

  build-image:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dukon-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/dukon-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # AUDIT-3 DEVOPS FIX #4: CVE scanning with Trivy.
      # Scans the built image for known vulnerabilities in OS packages
      # and application dependencies. Fails on CRITICAL/HIGH CVEs.
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/dukon-backend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      # AUDIT-3 DEVOPS FIX #7: Validate IMAGE_TAG is set before deploying.
      - name: Validate deployment variables
        run: |
          IMAGE_TAG="${{ github.sha }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::IMAGE_TAG (github.sha) is empty — aborting deploy."
            exit 1
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "Deploying image tag: $IMAGE_TAG"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/dukon

            # AUDIT-3 DEVOPS FIX #7: Use explicit image tag, never rely on 'latest'.
            export IMAGE_TAG="${{ github.sha }}"
            export DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/dukon-backend"

            # Pull new image
            docker compose -f docker-compose.production.yml pull

            # Run migrations in an isolated one-shot container before cutover.
            # If migrations fail, old containers keep running — no downtime.
            docker compose -f docker-compose.production.yml run --rm migrate

            # Roll out new containers
            docker compose -f docker-compose.production.yml up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f

      - name: Smoke test — wait for /health/
        run: |
          echo "Waiting for service to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.SSH_HOST }}/health/" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes."
          exit 1
